name: Release

on:
  push:
    branches:
      - main
    paths:
      - 'CHANGELOG.md'
  workflow_dispatch:
    inputs:
      force_release:
        description: 'Force release even if tag exists'
        required: false
        default: 'false'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version from CHANGELOG
        id: extract-version
        run: |
          VERSION=$(grep -m 1 '^## \[' CHANGELOG.md | grep -oE '[0-9]+\.[0-9]+\.[0-9]+' || echo "")
          if [ -z "$VERSION" ]; then
            echo "❌ Could not extract version from CHANGELOG.md"
            echo "Expected format: ## [X.Y.Z]"
            exit 1
          fi
          TAG="v${VERSION}"
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "✅ Extracted version: $VERSION"
          echo "✅ Git tag: $TAG"

      - name: Check if tag already exists
        id: check-tag
        run: |
          TAG="${{ steps.extract-version.outputs.tag }}"
          FORCE="${{ github.event.inputs.force_release }}"

          if git rev-parse "$TAG" >/dev/null 2>&1; then
            if [ "$FORCE" != "true" ]; then
              echo "⚠️ Tag $TAG already exists. Use workflow_dispatch with force_release=true to override."
              echo "should_release=false" >> $GITHUB_OUTPUT
              exit 0
            else
              echo "🔄 Force mode: Deleting existing tag $TAG"
              git tag -d "$TAG"
              git push origin --delete "$TAG" || true
              echo "should_release=true" >> $GITHUB_OUTPUT
            fi
          else
            echo "✅ Tag $TAG is new"
            echo "should_release=true" >> $GITHUB_OUTPUT
          fi

      - name: Create and push git tag
        if: steps.check-tag.outputs.should_release == 'true'
        run: |
          TAG="${{ steps.extract-version.outputs.tag }}"
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git tag -a "$TAG" -m "Release $TAG"
          git push origin "$TAG"
          echo "✅ Tag $TAG created and pushed"

      - name: Extract release notes
        if: steps.check-tag.outputs.should_release == 'true'
        id: release-notes
        run: |
          VERSION="${{ steps.extract-version.outputs.version }}"
          # Extract content between first ## [X.Y.Z] and the next one
          NOTES=$(awk "/^## \[$VERSION\]/{found=1; next} found && /^## \[/{exit} found{print}" CHANGELOG.md)
          echo "notes<<EOF" >> $GITHUB_OUTPUT
          echo "$NOTES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        if: steps.check-tag.outputs.should_release == 'true'
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ steps.extract-version.outputs.tag }}
          release_name: ${{ steps.extract-version.outputs.tag }}
          body: ${{ steps.release-notes.outputs.notes }}
          draft: false
          prerelease: false

      - name: Prepare for next version
        if: steps.check-tag.outputs.should_release == 'true'
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"

          VERSION="${{ steps.extract-version.outputs.version }}"
          MAJOR=$(echo $VERSION | cut -d. -f1)
          MINOR=$(echo $VERSION | cut -d. -f2)
          PATCH=$(echo $VERSION | cut -d. -f3)
          NEXT_VERSION="$MAJOR.$MINOR.$((PATCH + 1))"

          {
            head -n 1 CHANGELOG.md
            echo ""
            echo "## [$NEXT_VERSION]"
            echo ""
            echo "<!-- Prepare for next release: remove this line and write your release notes -->"
            echo ""
            tail -n +2 CHANGELOG.md
          } > CHANGELOG.md.tmp
          mv CHANGELOG.md.tmp CHANGELOG.md

          git add CHANGELOG.md
          git commit -m "chore: prepare for version $NEXT_VERSION [skip ci]" || true
          git push origin main || echo "⚠️  Could not push. Please review manually."
          echo "✅ Prepared CHANGELOG for version $NEXT_VERSION"
